name: HACKDATA CICD Pipeline

on:
  push:
    branches: [ rajat ]

jobs:
  BUILD_IMAGES:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:frontend"
          push: true
          tags: |
            rajatrulaniya/hackdata-frontend:${{ github.run_number }}
            rajatrulaniya/hackdata-frontend:latest

      - name: Build and Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:backend"
          push: true
          tags: |
            rajatrulaniya/hackdata-backend:${{ github.run_number }}
            rajatrulaniya/hackdata-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            git clone https://github.com/${{ github.repository }} || echo "NOTHING TO CLONE..."
            cd AQMS
            git checkout rajat
            docker compose pull
            docker compose up -d

